# 1. Define an explicit network so containers can definitively find each other
networks:
  distributed-net:
    driver: ${DOCKER_NETWORK_DRIVER}

# 2. Define persistent volumes so data survives restarts
volumes:
  kafka-data:
  postgres-data:
  mysql-data:
  mongo-data:

services:
  kafka:
    image: ${KAFKA_IMAGE}
    container_name: ${KAFKA_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${KAFKA_PORT_HOST}:${KAFKA_PORT_CONTAINER_EXTERNAL}"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      # Bind to 0.0.0.0 so it listens on all interfaces
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      # Advertise specific routes: 29092 for Docker, 9092 for your laptop
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    # 3. The Healthcheck: Forces Docker to verify Kafka is actually awake
    healthcheck:
      test: ["CMD-SHELL", "${KAFKA_HEALTHCHECK_CMD}"]
      interval: ${KAFKA_HEALTHCHECK_INTERVAL}
      timeout: ${KAFKA_HEALTHCHECK_TIMEOUT}
      retries: ${KAFKA_HEALTHCHECK_RETRIES}

  kafka-ui:
    image: ${KAFKA_UI_IMAGE}
    container_name: ${KAFKA_UI_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${KAFKA_UI_PORT_HOST}:${KAFKA_UI_PORT_CONTAINER}"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME}
      # Point EXACTLY to the internal listener we defined above
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS}
      DYNAMIC_CONFIG_ENABLED: ${KAFKA_UI_DYNAMIC_CONFIG_ENABLED}
    depends_on:
      kafka:
        # 4. Wait for the healthcheck to pass before starting the UI
        condition: service_healthy

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${POSTGRES_PORT_HOST}:${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "${POSTGRES_HEALTHCHECK_CMD}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  pgbouncer:
    image: ${PGBOUNCER_IMAGE}
    container_name: ${PGBOUNCER_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${PGBOUNCER_PORT_HOST}:${PGBOUNCER_PORT_CONTAINER}"
    environment:
      DB_USER: ${DB_POSTGRES_USER}
      DB_PASSWORD: ${DB_POSTGRES_PASSWORD}
      DB_HOST: ${PGBOUNCER_DB_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${DB_POSTGRES_NAME}
      AUTH_TYPE: ${PGBOUNCER_AUTH_TYPE}
      POOL_MODE: ${PGBOUNCER_POOL_MODE}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p ${PGBOUNCER_PORT_CONTAINER} -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_NAME} || exit 1",
        ]
      interval: ${PGBOUNCER_HEALTHCHECK_INTERVAL}
      timeout: ${PGBOUNCER_HEALTHCHECK_TIMEOUT}
      retries: ${PGBOUNCER_HEALTHCHECK_RETRIES}
    depends_on:
      postgres:
        condition: service_healthy

  mysql:
    image: ${MYSQL_IMAGE}
    container_name: ${MYSQL_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${MYSQL_PORT_HOST}:${MYSQL_PORT_CONTAINER}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "${MYSQL_HEALTHCHECK_HOST}"]
      interval: ${MYSQL_HEALTHCHECK_INTERVAL}
      timeout: ${MYSQL_HEALTHCHECK_TIMEOUT}
      retries: ${MYSQL_HEALTHCHECK_RETRIES}
      start_period: ${MYSQL_HEALTHCHECK_START_PERIOD}

  proxysql:
    image: ${PROXYSQL_IMAGE}
    container_name: ${PROXYSQL_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${PROXYSQL_PORT_HOST}:${PROXYSQL_PORT_CONTAINER}"
      - "${PROXYSQL_ADMIN_PORT_HOST}:${PROXYSQL_ADMIN_PORT_CONTAINER}"
    volumes:
      - ./infrastructure/proxysql/proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      mysql:
        condition: service_healthy

  mongo:
    image: ${MONGO_IMAGE}
    container_name: ${MONGO_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${MONGO_PORT_HOST}:${MONGO_PORT_CONTAINER}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "${MONGO_HEALTHCHECK_CMD}"]
      interval: ${MONGO_HEALTHCHECK_INTERVAL}
      timeout: ${MONGO_HEALTHCHECK_TIMEOUT}
      retries: ${MONGO_HEALTHCHECK_RETRIES}
      start_period: ${MONGO_HEALTHCHECK_START_PERIOD}

  mongo-express:
    image: ${MONGO_EXPRESS_IMAGE}
    container_name: ${MONGO_EXPRESS_CONTAINER_NAME}
    networks:
      - distributed-net
    ports:
      - "${MONGO_EXPRESS_PORT_HOST}:${MONGO_EXPRESS_PORT_CONTAINER}"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: ${MONGO_EXPRESS_MONGODB_URL}
      ME_CONFIG_BASICAUTH: ${MONGO_EXPRESS_BASICAUTH}
    depends_on:
      mongo:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    networks:
      - distributed-net
    expose:
      - "${API_GATEWAY_PORT}"
    environment:
      PORT: ${API_GATEWAY_PORT}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT}
      NOTIFICATION_SERVICE_URL: http://notification-service:${NOTIFICATION_SERVICE_PORT}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
    depends_on:
      auth-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    networks:
      - distributed-net
    expose:
      - "${AUTH_SERVICE_PORT}"
    environment:
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      DB_POSTGRES_HOST: ${DB_POSTGRES_HOST}
      DB_POSTGRES_PORT: ${DB_POSTGRES_PORT_CONTAINER}
      DB_POSTGRES_USER: ${DB_POSTGRES_USER}
      DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      DB_POSTGRES_NAME: ${DB_POSTGRES_NAME}
      DB_POSTGRES_POOL_MAX: ${DB_POSTGRES_POOL_MAX}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${AUTH_SERVICE_PORT}/ || exit 1",
        ]
      interval: ${AUTH_SERVICE_HEALTHCHECK_INTERVAL}
      timeout: ${AUTH_SERVICE_HEALTHCHECK_TIMEOUT}
      retries: ${AUTH_SERVICE_HEALTHCHECK_RETRIES}
      start_period: ${AUTH_SERVICE_HEALTHCHECK_START_PERIOD}
    depends_on:
      pgbouncer:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: ${NOTIFICATION_SERVICE_CONTAINER_NAME}
    networks:
      - distributed-net
    expose:
      - "${NOTIFICATION_SERVICE_PORT}"
    environment:
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${NOTIFICATION_SERVICE_PORT}/ || exit 1",
        ]
      interval: ${NOTIFICATION_SERVICE_HEALTHCHECK_INTERVAL}
      timeout: ${NOTIFICATION_SERVICE_HEALTHCHECK_TIMEOUT}
      retries: ${NOTIFICATION_SERVICE_HEALTHCHECK_RETRIES}
      start_period: ${NOTIFICATION_SERVICE_HEALTHCHECK_START_PERIOD}

  nginx:
    image: nginx:alpine
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80" # This is now the ONLY public entry point
    networks:
      - distributed-net
    depends_on:
      api-gateway:
        condition: service_started
