name: Build Services

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'packages/**'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      auth_service: ${{ steps.filter.outputs.auth_service }}
      notification_service: ${{ steps.filter.outputs.notification_service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'services/api-gateway/**'
            auth_service:
              - 'services/auth-service/**'
            notification_service:
              - 'services/notification-service/**'

  build-api-gateway:
    name: Build API Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.api_gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build API Gateway
        run: |
          cd services/api-gateway
          go build ./...
      - name: Build Docker image (API Gateway)
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          file: ./services/api-gateway/Dockerfile
          push: false
          tags: dummy-ecr/api-gateway:${{ github.sha }}

  build-auth-service:
    name: Build Auth Service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build logger-ts
        run: pnpm --filter "logger-ts" build
      - name: Build Auth Service
        run: pnpm --filter "auth-service" build
      - name: Build Docker image (Auth Service)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/auth-service/Dockerfile
          push: false
          tags: dummy-ecr/auth-service:${{ github.sha }}

  build-notification-service:
    name: Build Notification Service
    needs: detect-changes
    if: needs.detect-changes.outputs.notification_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Notification Service
        run: pnpm --filter "notification-service" build
      - name: Build Docker image (Notification Service)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/notification-service/Dockerfile
          push: false
          tags: dummy-ecr/notification-service:${{ github.sha }}