log_format gateway_observability escape=json
    '{"time":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$proxy_add_x_forwarded_for",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_instance":"$upstream_http_x_instance_id"}';

access_log /var/log/nginx/access.log gateway_observability;
error_log /var/log/nginx/error.log warn;

server {
    listen 80;
    server_tokens off;
    resolver 127.0.0.11 valid=10s;

    location / {
        set $api_gateway_upstream api-gateway:5000;
        proxy_pass http://$api_gateway_upstream;

        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_hide_header X-Instance-Id;

        add_header X-Request-Id $request_id always;
    }
}