log_format gateway_compact escape=json
    '{"ts":"$time_iso8601",'
    '"rid":"$request_id",'
    '"m":"$request_method",'
    '"u":"$request_uri",'
    '"s":$status,'
    '"rt":$request_time,'
    '"urt":"$upstream_response_time",'
    '"ua":"$upstream_addr",'
    '"us":"$upstream_status"}';

server {
    listen 80;
    server_tokens off;
    resolver 127.0.0.11 valid=10s;
    access_log /var/log/nginx/access.log gateway_compact;
    error_log /var/log/nginx/error.log warn;

    location = /auth {
        set $api_gateway_upstream api-gateway:5000;
        proxy_pass http://$api_gateway_upstream/auth/;

        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_hide_header X-Instance-Id;

        add_header X-Request-Id $request_id always;
    }

    location / {
        set $api_gateway_upstream api-gateway:5000;
        proxy_pass http://$api_gateway_upstream;

        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_hide_header X-Instance-Id;

        add_header X-Request-Id $request_id always;
    }
}